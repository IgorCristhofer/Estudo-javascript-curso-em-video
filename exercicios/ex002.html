<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulação de dados</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 18px;
            background-color: #d7f8f1;
            color: #242424;
            padding: 20px;
        }
        h1 {
            padding: 8px;
            border-radius: 12px;
            color: #d2e9ff;
            background-color: #2c3e50;
        }
    </style>
</head>
<body>
    <h1>Manipulação de dados</h1>
    <script>
        alert('Tipos de entradas de dados')
        let nome = prompt('Digite seu nome: ')
        alert(`Olá ${nome}, seja bem-vindo!`)
        document.write(`<p>Seu nome é ${nome.toUpperCase()}, e possui ${nome.length} letras.</p>`)
    </script>
</body>
</html>
